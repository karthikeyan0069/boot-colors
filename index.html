<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Colors Project</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

  <!-- Header -->
  <div class="bg-primary text-white text-center p-3">
    <h1>Bootstrap Colors Project</h1>
  </div>

  <div class="container mt-4">

    <!-- Text Colors -->
    <h3>Text Colors</h3>
    <p class="text-primary">Primary</p>
    <p class="text-success">Success</p>
    <p class="text-danger">Danger</p>
    <p class="text-warning">Warning</p>
    <p class="text-info">Info</p>
    <p class="text-secondary">Secondary</p>
    <p class="text-dark">Dark</p>
    <p class="text-muted">Muted</p>
    <p class="text-light bg-dark">Light</p>

    <hr>

    <!-- Background Colors -->
    <h3>Background Colors</h3>
    <p class="bg-primary text-white p-2">Primary</p>
    <p class="bg-success text-white p-2">Success</p>
    <p class="bg-danger text-white p-2">Danger</p>
    <p class="bg-warning p-2">Warning</p>
    <p class="bg-info text-white p-2">Info</p>
    <p class="bg-secondary text-white p-2">Secondary</p>
    <p class="bg-dark text-white p-2">Dark</p>
    <p class="bg-light p-2">Light</p>

    <hr>

    <!-- Opacity -->
    <h3>Opacity</h3>
    <p class="text-black-50">Black 50%</p>
    <p class="text-white-50 bg-dark p-2">White 50%</p>

    <hr>

    <!-- Cards Example -->
    <h3>Real UI Example</h3>
    <div class="row">
      <div class="col-md-4">
        <div class="bg-success text-white p-3">Success Card</div>
      </div>
      <div class="col-md-4">
        <div class="bg-warning p-3">Warning Card</div>
      </div>
      <div class="col-md-4">
        <div class="bg-danger text-white p-3">Danger Card</div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="bg-dark text-white text-center p-3 mt-4">
    <p>Footer Section</p>
  </div>

</body>
</html>
